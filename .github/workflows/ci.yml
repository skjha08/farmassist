name: FarmAssist CI

# WHY trigger on push to main: runs the eval suite automatically whenever
# code changes, catching regressions before they reach the submission.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # WHY google-cloud-cli here: ADK's Vertex AI mode needs Application
      # Default Credentials, which in CI comes from a service account key,
      # not interactive `gcloud auth login` (that only works locally).
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run eval harness
        env:
          GOOGLE_GENAI_USE_VERTEXAI: "TRUE"
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_LOCATION: "global"
          GEMINI_MODEL: "gemini-2.5-flash"
        run: python -m tests.eval_harness